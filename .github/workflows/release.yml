name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Build EXE
        run: uv run pyinstaller --noconfirm --clean --windowed --onefile --name pdf-translator app.py

      - name: Rename artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $target = "dist/pdf-translator-$tag-windows-x64.exe"
          Move-Item -Path "dist/pdf-translator.exe" -Destination $target

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pdf-translator-*-windows-x64.exe
